name: Deploy to Dokku

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_all:
        description: "Deploy all apps regardless of what changed"
        required: false
        default: "false"

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed subdirs
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            client:
              - 'client/**'
            server:
              - 'server/**'
            piston:
              - 'piston/**'

      # Piston deploys first so the server's PISTON_URL resolves if anything
      # in piston/ changed.
      - name: Deploy interview-piston
        if: steps.filter.outputs.piston == 'true' || github.event.inputs.force_all == 'true'
        uses: dokku/github-action@master
        with:
          git_remote_url: ssh://dokku@${{ secrets.DOKKU_HOST }}:22/interview-piston
          ssh_private_key: ${{ secrets.DOKKU_SSH_KEY }}

      - name: Deploy interview-server
        if: steps.filter.outputs.server == 'true' || github.event.inputs.force_all == 'true'
        uses: dokku/github-action@master
        with:
          git_remote_url: ssh://dokku@${{ secrets.DOKKU_HOST }}:22/interview-server
          ssh_private_key: ${{ secrets.DOKKU_SSH_KEY }}

      - name: Deploy interview-client
        if: steps.filter.outputs.client == 'true' || github.event.inputs.force_all == 'true'
        uses: dokku/github-action@master
        with:
          git_remote_url: ssh://dokku@${{ secrets.DOKKU_HOST }}:22/interview-client
          ssh_private_key: ${{ secrets.DOKKU_SSH_KEY }}
